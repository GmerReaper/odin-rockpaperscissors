<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Rock Paper Scissors</h1>

    <div id="buttons">
        <button id="rock"><img src="./images/rock.svg" alt="Rock"></button>
        <button id="paper"><img src="./images/paper.svg" alt="Paper"></button>
        <button id="scissors"><img src="./images/scissors.svg" alt="Scissors"></button>
    </div>
    <p id="roundCounter" style="display:none;">Round 1 / 5</p>
    <button id="startGame" style="display:none;">Play Again</button>

    <div id="results"></div>
    <p id="finalResult"></p>
    <img id="victoryImg" src="./images/victory.svg" style="display:none;">
    <img id="losingImg" src="./images/losing.svg" style="display:none;">

    <script src="rockPaperScissors.js"></script>
</body>

</html>
