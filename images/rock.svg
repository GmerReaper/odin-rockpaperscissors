<svg width="130" height="145" viewBox="0 0 130 145" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width: 130px; display: block; margin-inline: auto;">
      <title>Rock</title>
      <defs>
        <linearGradient id="rg" x1="0" y1="0" x2="0.6" y2="1">
          <stop offset="0%" stop-color="#8C7B6B"></stop>
          <stop offset="100%" stop-color="#3A2A1E"></stop>
        </linearGradient>
        <linearGradient id="lavag" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#FF6A00"></stop>
          <stop offset="100%" stop-color="#FF2200"></stop>
        </linearGradient>
      </defs>

      <ellipse cx="65" cy="120" rx="42" ry="9" fill="#1a1a2e" opacity="0.25"></ellipse>

      <g id="rock-main">
        <polygon points="65,14 108,48 102,100 28,100 22,48" fill="url(#rg)"></polygon>
        <polygon points="65,14 108,48 88,28" fill="#A08868" opacity="0.5"></polygon>
        <polygon points="22,48 65,14 42,38" fill="#907858" opacity="0.3"></polygon>
        <polygon points="28,100 22,48 46,85" fill="#1E1208" opacity="0.45"></polygon>
        <polygon points="102,100 108,48 84,85" fill="#1E1208" opacity="0.35"></polygon>

        <line x1="65" y1="14" x2="75" y2="60" stroke="#FF6A00" stroke-width="2" stroke-linecap="round" opacity="0" id="crack-glow"></line>
        <line x1="75" y1="60" x2="60" y2="100" stroke="#FF4400" stroke-width="1.5" stroke-linecap="round" opacity="0" id="crack-glow2"></line>
        <line x1="65" y1="14" x2="75" y2="60" stroke="#FFA040" stroke-width="1" stroke-linecap="round" opacity="0.6"></line>
        <line x1="75" y1="60" x2="60" y2="100" stroke="#FF6020" stroke-width="0.8" stroke-linecap="round" opacity="0.5"></line>
        <line x1="48" y1="35" x2="70" y2="75" stroke="#CC5500" stroke-width="0.8" stroke-linecap="round" opacity="0.35"></line>
        <line x1="85" y1="40" x2="72" y2="90" stroke="#CC5500" stroke-width="0.8" stroke-linecap="round" opacity="0.3"></line>

        <ellipse cx="50" cy="48" rx="7" ry="3.5" fill="#B09070" opacity="0.5" transform="rotate(-15 50 48)"></ellipse>
        <ellipse cx="85" cy="62" rx="5" ry="2.5" fill="#B09070" opacity="0.4" transform="rotate(10 85 62)"></ellipse>
        <ellipse cx="55" cy="80" rx="6" ry="2.5" fill="#B09070" opacity="0.35" transform="rotate(-8 55 80)"></ellipse>
      </g>

      <g id="spark1" style="transform-origin: 22px 48px">
        <line x1="22" y1="44" x2="22" y2="52" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="18" y1="48" x2="26" y2="48" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
      </g>
      <g id="spark2" style="transform-origin: 108px 70px">
        <line x1="108" y1="66" x2="108" y2="74" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="104" y1="70" x2="112" y2="70" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
      </g>
      <g id="spark3" style="transform-origin: 65px 14px">
        <line x1="65" y1="10" x2="65" y2="18" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="61" y1="14" x2="69" y2="14" stroke="#FF8800" stroke-width="1.5" stroke-linecap="round"></line>
