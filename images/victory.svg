<svg width="100%" viewBox="0 0 690 410" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width: 690px; display: block; margin-inline: auto;">
<title>Victory animation</title>
<desc>An animated trophy with bouncing stars and victory text</desc>
<style>
  .gold { fill: #f5c518; }
  .dark-gold { fill: #c9a000; }
  .shine { fill: #ffe87a; }
  .text-win { font-family: Arial, sans-serif; font-size: 52px; font-weight: bold; fill: #f5c518; text-anchor: middle; }
  .star { fill: #f5c518; }

  #trophy-group {
    animation: bounce 0.8s ease-in-out infinite alternate;
    transform-origin: 340px 200px;
  }
  #star1 { animation: twinkle 1s ease-in-out infinite alternate; transform-origin: 340px 50px; }
  #star2 { animation: twinkle 1.3s ease-in-out infinite alternate; transform-origin: 200px 70px; }
  #star3 { animation: twinkle 0.9s ease-in-out infinite alternate; transform-origin: 480px 70px; }
  #win-text { animation: pulse 1s ease-in-out infinite alternate; transform-origin: 340px 330px; }

  @keyframes bounce {
    from { transform: translateY(0px); }
    to { transform: translateY(-12px); }
  }
  @keyframes twinkle {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.3); opacity: 0.6; }
  }
  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
  }
</style>

<rect width="680" height="400" fill="transparent"></rect>

<g id="star1"><polygon class="star" points="340,25 352,60 390,60 360,82 372,117 340,95 308,117 320,82 290,60 328,60"></polygon></g>
<g id="star2"><polygon class="star" points="175,55 182,76 205,76 187,89 194,110 175,97 156,110 163,89 145,76 168,76"></polygon></g>
<g id="star3"><polygon class="star" points="505,55 512,76 535,76 517,89 524,110 505,97 486,110 493,89 475,76 498,76"></polygon></g>

<g id="trophy-group">
  <rect class="gold" x="290" y="120" width="100" height="110" rx="4"></rect>
  <rect class="dark-gold" x="300" y="120" width="80" height="15" rx="2"></rect>
  <ellipse class="gold" cx="340" cy="120" rx="70" ry="30"></ellipse>
  <ellipse class="shine" cx="340" cy="115" rx="40" ry="16"></ellipse>
  <rect class="gold" x="270" y="228" width="140" height="18" rx="4"></rect>
  <rect class="gold" x="300" y="244" width="80" height="14" rx="2"></rect>
  <rect class="dark-gold" x="280" y="256" width="120" height="16" rx="4"></rect>
  <path fill="none" stroke="#f5c518" stroke-width="18" stroke-linecap="round" d="M290,140 Q240,140 240,180 Q240,210 290,210"></path>
  <path fill="none" stroke="#f5c518" stroke-width="18" stroke-linecap="round" d="M390,140 Q440,140 440,180 Q440,210 390,210"></path>
</g>

<g id="win-text"><text class="text-win" x="340" y="340">Victory!</text></g>
</svg>