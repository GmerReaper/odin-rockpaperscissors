<svg width="130" height="145" viewBox="0 0 130 145" role="img" xmlns="http://www.w3.org/2000/svg" style="max-width: 130px; display: block; margin-inline: auto;">
      <title>Scissors</title>
      <defs>
        <linearGradient id="bladeg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#D8E4F0"></stop>
          <stop offset="100%" stop-color="#6A7A8A"></stop>
        </linearGradient>
        <linearGradient id="handleg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#E05C5C"></stop>
          <stop offset="100%" stop-color="#7A1515"></stop>
        </linearGradient>
        <linearGradient id="boltg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#DDDDDD"></stop>
          <stop offset="100%" stop-color="#888888"></stop>
        </linearGradient>
      </defs>

      <ellipse cx="65" cy="122" rx="40" ry="9" fill="#1a1a2e" opacity="0.22"></ellipse>

      <g id="scissors-main">
        <!-- left blade -->
        <polygon points="65,62 28,16 20,22 58,68" fill="url(#bladeg)"></polygon>
        <polygon points="65,62 28,16 34,14 62,65" fill="#E8F0F8" opacity="0.5"></polygon>
        <line id="blade-shine1" x1="30" y1="18" x2="62" y2="64" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"></line>

        <!-- right blade -->
        <polygon points="65,62 102,16 110,22 72,68" fill="url(#bladeg)"></polygon>
        <polygon points="65,62 102,16 96,14 68,65" fill="#E8F0F8" opacity="0.5"></polygon>
        <line id="blade-shine2" x1="100" y1="18" x2="68" y2="64" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"></line>

        <!-- blade tips -->
        <ellipse cx="24" cy="19" rx="6" ry="4" fill="#C8D8E8" transform="rotate(-50 24 19)"></ellipse>
        <ellipse cx="106" cy="19" rx="6" ry="4" fill="#C8D8E8" transform="rotate(50 106 19)"></ellipse>

        <!-- center bolt -->
        <circle cx="65" cy="65" r="9" fill="url(#boltg)" stroke="#AAAAAA" stroke-width="1.5"></circle>
        <circle cx="65" cy="65" r="4" fill="#555"></circle>
        <circle cx="63" cy="63" r="1.5" fill="#CCCCCC" opacity="0.7"></circle>

        <!-- left handle -->
        <path d="M58,72 Q40,82 36,98 Q32,112 44,116 Q56,120 62,106 L65,88 Z" fill="url(#handleg)"></path>
        <path d="M44,98 Q42,106 46,112" fill="none" stroke="#FF9090" stroke-width="1.5" stroke-linecap="round" opacity="0.5"></path>
        <circle cx="44" cy="108" r="7" fill="none" stroke="#FF9090" stroke-width="1.5" opacity="0.5"></circle>

        <!-- right handle -->
        <path d="M72,72 Q90,82 94,98 Q98,112 86,116 Q74,120 68,106 L65,88 Z" fill="url(#handleg)"></path>
        <path d="M86,98 Q88,106 84,112" fill="none" stroke="#FF9090" stroke-width="1.5" stroke-linecap="round" opacity="0.5"></path>
        <circle cx="86" cy="108" r="7" fill="none" stroke="#FF9090" stroke-width="1.5" opacity="0.5"></circle>

        <!-- handle shine -->
        <path d="M59,74 Q46,82 42,94" fill="none" stroke="#FF8080" stroke-width="1" stroke-linecap="round" opacity="0.4"></path>
        <path d="M71,74 Q84,82 88,94" fill="none" stroke="#FF8080" stroke-width="1" stroke-linecap="round" opacity="0.4"></path>
      </g>

      <g id="spark1" style="transform-origin: 20px 22px">
        <line x1="20" y1="18" x2="20" y2="26" stroke="#88CCFF" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="16" y1="22" x2="24" y2="22" stroke="#88CCFF" stroke-width="1.5" stroke-linecap="round"></line>
      </g>
      <g id="spark2" style="transform-origin: 110px 22px">
        <line x1="110" y1="18" x2="110" y2="26" stroke="#88CCFF" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="106" y1="22" x2="114" y2="22" stroke="#88CCFF" stroke-width="1.5" stroke-linecap="round"></line>
      </g>
      <g id="spark3" style="transform-origin: 65px 65px">
        <line x1="65" y1="50" x2="65" y2="56" stroke="#FFCC44" stroke-width="1.5" stroke-linecap="round"></line>
        <line x1="61" y1="53" x2="69" y2="53" stroke="#FFCC44" stroke-width="1.5" stroke-linecap="round"></line>
      </g>
    </svg>